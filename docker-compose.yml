version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: urbanmove_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: urbanmove_pass
      MYSQL_DATABASE: urbanmove_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initializes the database with schema and mock data on first run
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-purbanmove_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: urbanmove_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=urbanmove_pass
      - DB_NAME=urbanmove_db
      - DB_PORT=3306
      - FLASK_DEBUG=True
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
